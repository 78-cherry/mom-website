<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Mom ❤️</title>

  <style>
    .gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.gallery img {
  width: 250px;
  height: 300px;
  object-fit: cover;
  border-radius: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #ffd6e7, #fff0f5);
      overflow-x: hidden;
      text-align: center;
    }
    <div class="gallery">

  <img src="mom1.jpg">
  <img src="mom2.jpg">
  <img src="mom3.jpg">
  <img src="mom4.jpg">

</div>

    h1 {
      margin-top: 30px;
      color: #ff2d75;
      font-size: 40px;
    }

    p {
      color: #444;
      font-size: 18px;
      padding: 0 20px;
    }

    .memory {
      background: white;
      width: 280px;
      margin: 20px auto;
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      animation: float 3s ease-in-out infinite;
    }

    .memory img {
      width: 100%;
      border-radius: 15px;
    }

    .balloon {
      width: 90px;
      height: 110px;
      background: #ff4f8b;
      border-radius: 50%;
      position: relative;
      margin: 40px auto;
      cursor: pointer;
      animation: updown 2s infinite;
    }

    .balloon::after {
      content: '';
      width: 2px;
      height: 60px;
      background: black;
      position: absolute;
      left: 44px;
      top: 100px;
    }

    button {
      background: #ff2d75;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      margin-bottom: 40px;
    }

    @keyframes float {
      0% {transform: translateY(0px);}
      50% {transform: translateY(-10px);}
      100% {transform: translateY(0px);}
    }

    @keyframes updown {
      0% {transform: translateY(0);}
      50% {transform: translateY(-15px);}
      100% {transform: translateY(0);}
    }
  </style>
</head>

<body>
  <audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
  </audio>

  <h1>For My Mother ❤️</h1>

  <p>
    Thank you for loving me every single day 🌸
    You are my safest place and my biggest strength.
  </p>

  <div class="memory">
  <img src="mom.jpg">
    <h3>My Favorite Memory ✨</h3>
    <p>Every moment with you feels like home.</p>
  </div>

  <div class="balloon" onclick="popBalloon()"></div>

  <button onclick="showMessage()">
    Click Me 💖
  </button>

  <script>
    function popBalloon() {
      alert("I Love You Mom ❤️")
    }

    function showMessage() {
      alert("Thank you for everything you do 🌸")
    }
  </script>

</body>
</html>
